<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Station Typer - Istanbul</title>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nova+Flat&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
</head>

<body>
    <div id="map"></div>
    <div id="foreground" class="blurred">
        <div id="menu">
            <div id="start-menu">
                <h1 style="font-size:4em; padding:1.5vw;">Station Typer - Istanbul</h1>

                <!-- Game Line Pool Options -->
                <!-- filters: ofsl, ofss, ofas -->
                <div id="option-pool" class="radio-options">
                    <input type="radio" id="opt-pool-single-line" value="single-line" name="pool-options" checked>
                    <label for="opt-pool-single-line">Single Line</label>

                    <input type="radio" id="opt-pool-single-side" value="single-side" name="pool-options">
                    <label for="opt-pool-single-side">Single Side</label>

                    <input type="radio" id="opt-pool-all-stations" value="all-stations" name="pool-options">
                    <label for="opt-pool-all-stations">All Stations</label>

                    <input type="radio" id="opt-pool-custom" value="custom" name="pool-options">
                    <label for="opt-pool-custom">Custom</label>
                </div>

                <!-- SINGLE LINE OPTIONS (GENERATED FROM DATA) -->
                <div id="option-lines" class="radio-options ofsl">
                    <input type="radio" id="opt-lines-m1" name="lines-options" checked>
                    <label for="opt-lines-m1">M1</label>

                    <input type="radio" id="opt-lines-m2" name="lines-options">
                    <label for="opt-lines-m2">M2</label>
                </div>

                <!-- SINGLE LINE DIRECTION OPTIONS (GENERATED FROM DATA) -->
                <div id="option-direction" class="radio-options ofsl">
                    <input type="radio" id="opt-direction-normal" value="normal" name="direction-options" checked>
                    <label for="opt-direction-normal">Yenikapı</label>

                    <input type="radio" id="opt-direction-inverse" value="reverse" name="direction-options">
                    <label for="opt-direction-inverse">Hacıosman</label>
                </div>

                <!-- SINGLE SIDE OPTIONS -->
                <div id="option-side" class="radio-options ofss">
                    <input type="radio" id="opt-side-eu" value="EU" name="side-options" checked>
                    <label for="opt-side-eu">European Side Only</label>

                    <input type="radio" id="opt-side-an" value="AN" name="side-options">
                    <label for="opt-side-an">Anatolian Side Only</label>
                </div>

                <!-- ALL STATIONS OPTIONS -->
                <!-- COMMUTER -->
                <div id="option-commuter" class="radio-options ofas">
                    <label style="pointer-events: none;">Commuter Lines: </label>

                    <input type="radio" id="opt-commuter-yes" value="enabled" name="commuter-options" checked>
                    <label for="opt-commuter-yes">Enabled</label>

                    <input type="radio" id="opt-commuter-no" value="disabled" name="commuter-options">
                    <label for="opt-commuter-no">Disabled</label>
                </div>

                <!-- REGIONAL -->
                <div id="option-regional" class="radio-options ofas">
                    <label style="pointer-events: none;">Regional Lines: </label>

                    <input type="radio" id="opt-regional-yes" value="enabled" name="regional-options">
                    <label for="opt-regional-yes">Enabled</label>

                    <input type="radio" id="opt-regional-no" value="disabled" name="regional-options" checked>
                    <label for="opt-regional-no">Disabled</label>
                </div>

                <!-- METROBUS -->
                <div id="option-metrobus" class="radio-options ofas">
                    <label style="pointer-events: none;">Bus Rapid Transit: </label>

                    <input type="radio" id="opt-metrobus-yes" value="enabled" name="metrobus-options">
                    <label for="opt-metrobus-yes">Enabled</label>

                    <input type="radio" id="opt-metrobus-no" value="disabled" name="metrobus-options" checked>
                    <label for="opt-metrobus-no">Disabled</label>
                </div>

                <!-- CUSTOM POOL OPTIONS -->
                <div id="option-custom" class="radio-options ofcc" style="flex-direction: column;">
                    <label style="pointer-events: none">Text</label>
                    <input type="file" id="opt-custom-file" accept=".csv, .txt">
                    <label style="pointer-events: none" id="opt-custom-result"></label>
                </div>

                <!-- OPTIONS -->
                <div class="toggle-options">
                    <div>
                        <input id="toggle-volume" type="checkbox" style="background-image:url('icons/volume.svg')"
                            checked>
                        <input id="toggle-random" type="checkbox" style="background-image:url('icons/shuffle.svg')">
                        <input id="toggle-nohint" type="checkbox" style="background-image:url('icons/no-hint.svg')">
                        <input id="toggle-hint-1" type="checkbox"
                            style="background-image:url('icons/hint-initial.svg');display:none">
                    </div>
                    <p id="toggle-info-text">&shy;</p>
                </div>

                <!-- START BUTTON -->
                <div style="flex:1; display:flex; flex-direction:column;">
                    <div style="flex:1"></div>
                    <div id="start-button" class="menu-button">START!</div>
                    <div style="height:1vw;"></div>
                </div>

                <!-- LANGUAGE BUTTON -->
                <div id="lang-button"><img src="flag/us.png"></div>

                <!-- GITHUB BUTTON -->
                <div id="github-button"></div>
            </div>

            <!-- GAME MENU -->
            <div id="game-menu" style="display:none">
                <div class="game-info-table" style="flex:0.18;">
                    <div class="game-info">
                        <p id="ginfo-wpm" class="maininfo">-</p>
                        <p class="subinfo">WPM</p>
                    </div>
                    <div class="game-info">
                        <p id="ginfo-time" class="maininfo">-</p>
                        <p class="subinfo">Timer</p>
                    </div>
                </div>
                <div class="game-info-table" style="flex:0.64;display:flex;flex-direction:column;">
                    <div class="metro-scheme-container" id="metro-scheme">

                        <div class="metro-track-bg"></div>
                        <div class="metro-track-fill"></div>

                        <div class="stations-row" id="stations-row">
                            <!-- WILL BE GENERATED BY CODE  -->
                        </div>
                    </div>
                    <div id="game-input-field" class="game-input-field">
                        <div>
                            <p id="game-input-text"></p>
                        </div>
                        <input id="game-input" value="">
                    </div>
                    <div id="back-button-field" class="game-input-field" style="display:none">
                        <div id="back-button" class="menu-button">RETURN BACK!</div>
                    </div>
                </div>
                <div class="game-info-table" style="flex:0.18;">
                    <div class="game-info">
                        <p id="ginfo-acc" class="maininfo">-</p>
                        <p class="subinfo">Accuracy</p>
                    </div>
                    <div class="game-info">
                        <p id="ginfo-prog" class="maininfo">-</p>
                        <p class="subinfo">Progress</p>
                    </div>
                </div>
            </div>

            <!-- GAME START COUNTDOWN -->
            <div id="countdown">
                <p id="countdown-text"></p>
            </div>

            <!-- STATION VISIT EFFECT -->
            <div id="vfx-visit">
                <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
                    <defs>
                        <radialGradient id="vfx-visit-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                            <stop offset="0%" stop-color="var(--color)" stop-opacity="0" />
                            <stop offset="100%" stop-color="var(--color)" stop-opacity="0.784" />
                        </radialGradient>
                    </defs>
                    <circle cx="128" cy="128" r="126" fill="url(#vfx-visit-grad)" stroke="var(--color)"
                        stroke-width="4" />
                </svg>
            </div>

            <!-- NAVIGATION CURSOR MARKER -->
            <div id="vfx-cursor">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
                    <path d="M 54,32 L 14,54 L 24,32 L 14,10 Z" fill="#000000" stroke="#dddddd" stroke-width="4"
                        stroke-linejoin="round" />
                </svg>
            </div>
        </div>
    </div>

    <!-- SOUNDS -->
    <audio id="sfx-correct" src="sound/correct.ogg" preload="auto"></audio>
    <audio id="sfx-incorrect" src="sound/incorrect.ogg" preload="auto"></audio>
    <audio id="sfx-delete" src="sound/delete.ogg" preload="auto"></audio>
    <audio id="sfx-countdown" src="sound/countdown.ogg" preload="auto"></audio>

    <audio id="sfx-visit" src="sound/visit.ogg" preload="auto"></audio>
